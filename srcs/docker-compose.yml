name: inception

services:
  nginx:
    build: requirements/nginx
    image: nginx:1.0
    environment:
      DOMAIN_NAME: $WP_DOMAIN
    networks:
      - inception-net
    ports:
      - "443:443"
    volumes:
      - wp_data:/var/www/html
    secrets:
      - tls_cert
      - tls_key
    restart: unless-stopped

  wordpress:
    build: requirements/wordpress
    image: wordpress:1.0
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: $DB_NAME
      WORDPRESS_DB_USER: $DB_ADMIN
      WORDPRESS_DOMAIN: $WP_DOMAIN
      WORDPRESS_TITLE: $WP_TITLE
      WORDPRESS_ADMIN_USER: $WP_ADMIN_USER
      WORDPRESS_ADMIN_EMAIL: $WP_ADMIN_MAIL
      WORDPRESS_USER: $WP_USER
      WORDPRESS_USER_EMAIL: $WP_USER_MAIL
    networks:
      - inception-net
    volumes:
      - wp_data:/var/www/html
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    restart: unless-stopped

  mariadb:
    build: requirements/mariadb
    image: mariadb:1.0
    environment:
      MYSQL_DATABASE: $DB_NAME
      MYSQL_USER: $DB_ADMIN
    networks:
      - inception-net
    volumes:
      - db_data:/var/lib/mysql
    secrets:
      - db_password
    restart: unless-stopped

  redis:
    build: requirements/bonus/redis
    image: redis:1.0
    networks:
      - inception-net
    restart: unless-stopped
  
  vsftpd:
    build: requirements/bonus/vsftpd
    image: vsftpd:1.0
    environment:
      PASV_ADDRESS: $PASV_ADDRESS
      VSFTPD_USER: $VSFTPD_USER
    networks:
      - inception-net
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    volumes:
      - wp_data:/var/www/html
    secrets:
      - vsftpd_password
    stop_grace_period: 2s
    restart: unless-stopped

  adminer:
    build: requirements/bonus/adminer
    image: adminer:1.0
    networks:
      - inception-net
    restart: unless-stopped

  portainer:
    build: requirements/bonus/portainer
    image: portainer:1.0
    networks:
      - inception-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    secrets:
      - portainer_password
    restart: unless-stopped

networks:
  inception-net:
    name: inception-net
    driver: bridge

volumes:
  wp_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/wp_data

  db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/db_data

  portainer_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/${USER}/data/bonus/portainer_data
 
secrets:
  db_password:
    file: ../secrets/db_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt
  tls_cert:
    file: ../secrets/tls_cert.pem
  tls_key:
    file: ../secrets/tls_key.pem
  vsftpd_password:
    file: ../secrets/vsftpd_password.txt
  portainer_password:
    file: ../secrets/portainer_password.txt
